name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: palilleria
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d palilleria"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CI: true
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/palilleria?schema=public
      AUTH_SECRET: ci-auth-secret-not-for-production-use-only
      NEXTAUTH_SECRET: ci-auth-secret-not-for-production-use-only
      NEXTAUTH_URL: http://localhost:3100
      E2E_PORT: "3100"
      EXPERIMENTAL_TITLE_BLOCK_OCR: "false"
      STORAGE_DRIVER: local
      LOCAL_STORAGE_PATH: ./storage
      MAX_UPLOAD_SIZE_MB: "50"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify takeoff
        run: npm run verify:takeoff

      - name: Verify title block crop
        run: npm run verify:title-block-crop

      - name: Verify auto-takeoff
        run: npm run verify:auto-takeoff

      - name: E2E tests
        run: npm run test:e2e
